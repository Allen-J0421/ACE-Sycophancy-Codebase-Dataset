# Predator-Prey simulation configuration.
# Edit these values and re-run — no recompilation required.

# Field dimensions (grid rows x columns).
field.depth=200
field.width=320

# Plants: ordered weighted rules, plus the fallback grown where no rule wins.
# Each cell gets one plant; a Flower with the probability below, otherwise the default.
plant.order=Flower
plant.Flower.probability=0.07
plant.default=Grass

# Animals: cascade evaluated in this priority order — the first to win its roll
# claims the cell, so earlier entries take precedence.
animal.order=Bird,Mouse,Duck,Wolf,Bear
animal.Bird.probability=0.07
animal.Mouse.probability=0.07
animal.Duck.probability=0.07
animal.Wolf.probability=0.03
animal.Bear.probability=0.03
